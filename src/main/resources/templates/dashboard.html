<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analityka Wyników</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-color: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.2);
            --border-radius: 16px;
        }

        body {
            margin: 0;
            padding: 2rem;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3rem; /* Odstęp między dashboardami różnych zawodników */
        }

        .dashboard-container {
            width: 100%;
            max-width: 900px;
            background-color: rgba(255, 255, 255, 0.02);
            padding: 2rem;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .profile-header {
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .profile-header h1 {
            margin: 0;
            font-size: 2.5rem;
            font-weight: 700;
        }

        .profile-header p {
            margin: 0.5rem 0 0 0;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background-color: var(--card-bg);
            padding: 1.5rem;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.2s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: rgba(56, 189, 248, 0.3);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2), 0 0 15px var(--accent-glow);
        }

        .stat-title {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            margin: 0;
        }

        .stat-unit {
            font-size: 1rem;
            color: var(--text-muted);
            font-weight: normal;
        }

        .laps-section {
            background-color: var(--card-bg);
            padding: 1.5rem;
            border-radius: var(--border-radius);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .laps-section h2 { margin-top: 0; margin-bottom: 1.5rem; font-size: 1.25rem; }

        .lap-item { display: flex; align-items: center; margin-bottom: 1.2rem; }
        .lap-item:last-child { margin-bottom: 0; }

        .lap-number {
            width: 40px; height: 40px;
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; color: var(--text-muted); margin-right: 1rem;
        }

        .lap-data { flex-grow: 1; }

        .lap-time-text {
            display: flex; justify-content: space-between;
            margin-bottom: 0.4rem; font-family: monospace; font-size: 1.1rem;
        }

        .lap-bar-container {
            width: 100%; height: 8px;
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 4px; overflow: hidden;
        }

        .lap-bar {
            height: 100%; background-color: var(--accent-color);
            border-radius: 4px; transition: width 0.5s ease-out;
        }

        /* Dynamiczne kolory dla najszybszego i najwolniejszego okrążenia */
        .best-lap .lap-bar { background-color: #10b981; }
        .best-lap .lap-number { background-color: rgba(16, 185, 129, 0.1); color: #10b981; }
        .best-lap .lap-time-text span:last-child { color: #10b981; font-weight: bold; }

        .worst-lap .lap-bar { background-color: #f43f5e; }
        .worst-lap .lap-number { background-color: rgba(244, 63, 94, 0.1); color: #f43f5e; }
        .worst-lap .lap-time-text span:last-child { color: #f43f5e; }

    </style>
</head>
<body>

<div class="dashboard-container" th:each="effort : ${efforts}">

    <header class="profile-header">
        <div>
            <p>Analysis</p>
            <h1 th:text="${effort.name} + ' ' + ${effort.surname}">Athlete</h1>
        </div>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-title">Distance</div>
            <div class="stat-value">
                <span th:text="${effort.distance}">0</span>
                <span class="stat-unit">m</span>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-title">Total time</div>
            <div class="stat-value">
                <span th:text="${effort.totalTime}">0.0</span>
                <span class="stat-unit">s</span>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-title">Average speed</div>
            <div class="stat-value">
                <span th:text="${effort.calculateSpeed()}">0.0</span>
                <span class="stat-unit">m/s</span>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-title">Average lap time</div>
            <div class="stat-value">
                <span th:text="${effort.getAverageLapTime()}">0.0</span>
                <span class="stat-unit">s / okr.</span>
            </div>
        </div>
    </div>

    <div class="laps-section">
        <h2>Laps</h2>

        <div th:each="lap, iterStat : ${effort.lapTimes}"
             class="lap-item"
             th:classappend="${lap == effort.getFastestLap()} ? 'best-lap' : (${lap == effort.getSlowestLap()} ? 'worst-lap' : '')">

            <div class="lap-number" th:text="${iterStat.count}">1</div>

            <div class="lap-data">
                <div class="lap-time-text">
                        <span>Lap <span th:text="${iterStat.count}"></span>
                            <span th:if="${lap == effort.getFastestLap()}" style="font-size: 0.8rem; text-transform: uppercase;">(Best)</span>
                        </span>
                    <span th:text="${lap} + 's'">0.00s</span>
                </div>
                <div class="lap-bar-container">
                    <div class="lap-bar" th:style="|width: ${effort.getLapBarWidth(lap)}%;|"></div>
                </div>
            </div> </div> </div> </div> </body>
</html>

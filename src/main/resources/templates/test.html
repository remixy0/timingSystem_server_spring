<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Analityczny - Wyniki</title>
    <style>
        /* Zmienne kolorystyczne dla ciemnego motywu */
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-color: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.2);
            --border-radius: 16px;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .dashboard-container {
            width: 100%;
            max-width: 900px;
            padding: 2rem;
            box-sizing: border-box;
        }

        /* Nagłówek profilu */
        .profile-header {
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .profile-header h1 {
            margin: 0;
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .profile-header p {
            margin: 0.5rem 0 0 0;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        /* Siatka statystyk */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background-color: var(--card-bg);
            padding: 1.5rem;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2), 0 0 15px var(--accent-glow);
            border-color: rgba(56, 189, 248, 0.3);
        }

        .stat-title {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            margin: 0;
        }

        /* Sekcja okrążeń */
        .laps-section {
            background-color: var(--card-bg);
            padding: 1.5rem;
            border-radius: var(--border-radius);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .laps-section h2 {
            margin-top: 0;
            font-size: 1.25rem;
            margin-bottom: 1.5rem;
        }

        .lap-item {
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
        }

        .lap-item:last-child {
            margin-bottom: 0;
        }

        .lap-number {
            width: 40px;
            height: 40px;
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--text-muted);
            margin-right: 1rem;
        }

        .lap-data {
            flex-grow: 1;
        }

        .lap-time-text {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.4rem;
            font-family: monospace;
            font-size: 1.1rem;
        }

        /* Wizualny pasek czasu (im krótszy tym lepszy) */
        .lap-bar-container {
            width: 100%;
            height: 8px;
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            overflow: hidden;
        }

        .lap-bar {
            height: 100%;
            background-color: var(--accent-color);
            border-radius: 4px;
        }

        /* Najlepszy czas podświetlony na zielono */
        .best-lap .lap-bar {
            background-color: #10b981;
        }
        .best-lap .lap-number {
            background-color: rgba(16, 185, 129, 0.1);
            color: #10b981;
        }
    </style>
</head>
<body>

<div class="dashboard-container">

    <header class="profile-header">
        <p>Profil Zawodnika</p>
        <h1>Stanisław Sikora</h1>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-title">Przebyty Dystans</div>
            <div class="stat-value">1000m</div>
        </div>
        <div class="stat-card">
            <div class="stat-title">Czas Całkowity</div>
            <div class="stat-value">41.268s</div>
        </div>
        <div class="stat-card">
            <div class="stat-title">Średnie Tempo</div>
            <div class="stat-value">16.661s <span style="font-size: 1rem; color: #94a3b8; font-weight: normal;">/ okrążenie</span></div>
        </div>
    </div>

    <div class="laps-section">
        <h2>Analiza Okrążeń (Lap Times)</h2>

        <div class="lap-item">
            <div class="lap-number">1</div>
            <div class="lap-data">
                <div class="lap-time-text">
                    <span>Okrążenie 1</span>
                    <span>16.821s</span>
                </div>
                <div class="lap-bar-container">
                    <div class="lap-bar" style="width: 97%;"></div>
                </div>
            </div>
        </div>

        <div class="lap-item">
            <div class="lap-number">2</div>
            <div class="lap-data">
                <div class="lap-time-text">
                    <span>Okrążenie 2</span>
                    <span style="color: #f43f5e;">17.234s</span>
                </div>
                <div class="lap-bar-container">
                    <div class="lap-bar" style="width: 100%; background-color: #f43f5e;"></div>
                </div>
            </div>
        </div>

        <div class="lap-item best-lap">
            <div class="lap-number">3</div>
            <div class="lap-data">
                <div class="lap-time-text">
                    <span>Okrążenie 3 (Najlepszy)</span>
                    <span style="color: #10b981;">15.927s</span>
                </div>
                <div class="lap-bar-container">
                    <div class="lap-bar" style="width: 92%;"></div>
                </div>
            </div>
        </div>

    </div>

</div>

</body>
</html>

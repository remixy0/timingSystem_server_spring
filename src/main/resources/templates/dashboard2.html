<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analityka Wyników</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --card-hover: #2a374a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-color: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.2);
            --border-radius: 16px;
        }

        body {
            margin: 0;
            padding: 2rem;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem; /* Mniejszy odstęp między zwiniętymi kartami */
        }

        .date-text {
        font-size: 0.8rem;          /* Zmniejsza czcionkę */
        color: var(--text-muted);   /* Nadaje ładny, szary kolor z naszego motywu */
        font-weight: normal;        /* Usuwa pogrubienie */
         }

        .dashboard-container {
            width: 100%;
            max-width: 900px;
            background-color: rgba(255, 255, 255, 0.02);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden; /* Ważne do animacji rozwijania */
            transition: border-color 0.3s ease;
        }

        .dashboard-container:hover {
            border-color: rgba(56, 189, 248, 0.3);
        }

        /* Sekcja nagłówka widoczna zawsze (Klikalna) */
        .summary-header {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            background-color: var(--card-bg);
            transition: background-color 0.2s ease;
        }

        .summary-header:hover {
            background-color: var(--card-hover);
        }

        .summary-info h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .summary-info p {
            margin: 0.2rem 0 0 0;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .summary-quick-stats {
            display: flex;
            gap: 2rem;
            align-items: center;
            text-align: right;
        }

        .quick-stat-label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 0.2rem;
        }

        .quick-stat-value {
            font-size: 1.25rem;
            font-weight: bold;
        }

        /* Ikonka strzałki do rozwijania */
        .expand-icon {
            font-size: 1.5rem;
            color: var(--text-muted);
            transition: transform 0.3s ease;
        }

        /* Rozwijana sekcja szczegółów (domyślnie ukryta) */
        .details-section {
            max-height: 0; /* Ukryte */
            opacity: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out, opacity 0.4s ease-out, padding 0.4s ease-out;
            padding: 0 2rem; /* Zero paddingu górnego/dolnego gdy ukryte */
        }

        /* Klasa dodawana przez JS, gdy element jest otwarty */
        .dashboard-container.open .details-section {
            max-height: 2000px; /* Wystarczająco dużo miejsca na rozwinięcie */
            opacity: 1;
            padding: 2rem 2rem; /* Przywracamy padding górny/dolny */
        }

        .dashboard-container.open .expand-icon {
            transform: rotate(180deg);
        }

        /* Kreska oddzielająca podsumowanie od detali */
        .details-divider {
            height: 1px;
            background-color: rgba(255, 255, 255, 0.1);
            margin-bottom: 2rem;
        }

        /* ---- Reszta starych stylów dla Gridu i Wykresów ---- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background-color: var(--card-bg);
            padding: 1.5rem;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-title {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value { font-size: 2rem; font-weight: 700; margin: 0; }
        .stat-unit { font-size: 1rem; color: var(--text-muted); font-weight: normal; }

        .laps-section {
            background-color: var(--card-bg);
            padding: 1.5rem;
            border-radius: var(--border-radius);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .laps-section h2 { margin-top: 0; margin-bottom: 1.5rem; font-size: 1.25rem; }

        .lap-item { display: flex; align-items: center; margin-bottom: 1.2rem; }
        .lap-item:last-child { margin-bottom: 0; }

        .lap-number {
            width: 40px; height: 40px;
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; color: var(--text-muted); margin-right: 1rem;
        }

        .lap-data { flex-grow: 1; }

        .lap-time-text {
            display: flex; justify-content: space-between;
            margin-bottom: 0.4rem; font-family: monospace; font-size: 1.1rem;
        }

        .lap-bar-container {
            width: 100%; height: 8px;
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 4px; overflow: hidden;
        }

        .lap-bar {
            height: 100%; background-color: var(--accent-color);
            border-radius: 4px; transition: width 0.5s ease-out;
        }

        .best-lap .lap-bar { background-color: #10b981; }
        .best-lap .lap-number { background-color: rgba(16, 185, 129, 0.1); color: #10b981; }
        .best-lap .lap-time-text span:last-child { color: #10b981; font-weight: bold; }

        .worst-lap .lap-bar { background-color: #f43f5e; }
        .worst-lap .lap-number { background-color: rgba(244, 63, 94, 0.1); color: #f43f5e; }
        .worst-lap .lap-time-text span:last-child { color: #f43f5e; }
    </style>
</head>
<body>


<div class="dashboard-container" th:fragment="effortsList" th:each="effort : ${efforts}" >

    <div class="summary-header" onclick="toggleDetails(this)">
        <div class="summary-info">
            <p>Athlete</p>
            <h1 th:text="${effort.getAthlete()}">Imię Nazwisko</h1>
        </div>

        <div>
            <span class="date-text" th:text="${effort.getDate()}">20.02.2026</span>
        </div>
        <div class="summary-quick-stats">
            <div>
                <span class="quick-stat-label">Distance</span>
                <span class="quick-stat-value" th:text="${effort.getDistance()}">0m</span>
            </div>
            <div>
                <span class="quick-stat-label">Total Time</span>
                <span class="quick-stat-value" th:text="${effort.getTotalTime()} + 's'">0.0s</span>
            </div>
            <div class="expand-icon">▼</div>
        </div>
    </div>

    <div class="details-section">

        <div class="details-divider"></div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-title">Average speed</div>
                <div class="stat-value">
                    <span th:text="${effort.calculateSpeed()}">0.0</span>
                    <span class="stat-unit">km/h</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-title">Average lap time</div>
                <div class="stat-value">
                    <span th:text="${effort.getAverageLapTime()}">0.0</span>
                    <span class="stat-unit">s/lap</span>
                </div>
            </div>
        </div>

        <div class="laps-section">
            <h2>Laps</h2>

            <div th:each="lap, iterStat : ${effort.getLapTimes()}"
                 class="lap-item"
                 th:classappend="${lap == effort.getFastestLap()} ? 'best-lap' : (${lap == effort.getSlowestLap()} ? 'worst-lap' : '')">

                <div class="lap-number" th:text="${iterStat.count}">1</div>

                <div class="lap-data">
                    <div class="lap-time-text">
                            <span>Lap <span th:text="${iterStat.count}"></span>
                                <span th:if="${lap == effort.getFastestLap()}" style="font-size: 0.8rem; text-transform: uppercase;">(Best)</span>
                            </span>
                        <span th:text="${lap} + 's'">0.00s</span>
                    </div>
                    <div class="lap-bar-container">
                        <div class="lap-bar" th:style="|width: ${effort.getLapBarWidth(lap)}%;|"></div>
                    </div>
                </div>
            </div>
        </div>


    </div> </div> <script>
    function toggleDetails(element) {
        // Znajdź główny kontener (.dashboard-container)
        const container = element.parentElement;

        // Przełącz klasę 'open' (jeśli jej nie ma to dodaj, jeśli jest to usuń)
        container.classList.toggle('open');
    }
</script>

<script>
    const eventSource = new EventSource('/efforts');

 eventSource.onmessage = function(event) {
     if (event.data === "ODSWIEZ") {
         console.log("Pojawiły się nowe dane! Odświeżam całą stronę...");

         // Ta jedna linijka robi dokładnie to samo, co kliknięcie "Odśwież" w przeglądarce
         window.location.reload();
     }
 };

 eventSource.onerror = function(error) {
     console.log("Utracono połączenie. Przeglądarka spróbuje ponownie...");
 };
</script>

</body>
</html>
